<dialog id="edit_station_modal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Edit station</h3>
        <form id="editStationForm">
            <fieldset class="fieldset">
                <input type="hidden" id="edit_station_id">
                <input type="text"
                       class="input mt-3 w-full"
                       name="station_url"
                       id="edit_station_url"
                       placeholder="http://"
                       required />
                <p class="label pl-0.5">url</p>
                <input type="text"
                       class="input mt-5 w-full"
                       name="station_name"
                       id="edit_station_name"
                       placeholder="piirakka"
                       required />
                <p class="label mb-5 pl-0.5">name</p>
            </fieldset>
            <div class="flex justify-between mt-4">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" id="delete_station_button" class="btn btn-error">Delete</button>
                <button type="button" class="btn" onclick="edit_station_modal.close()">Close</button>
            </div>
        </form>
    </div>
</dialog>
<script>
    const editForm = document.getElementById('editStationForm');
    editForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('edit_station_id').value;
        const name = document.getElementById('edit_station_name').value.trim();
        const url = document.getElementById('edit_station_url').value.trim();

        if (!name || !url) {
            alert('Both fields are required.');
            return;
        }

        try {
            const response = await fetch(`/api/station/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ station_name: name, station_url: url })
            });
            if (response.ok) {
                alert('Station updated successfully!');
                edit_station_modal.close();
                window.location.reload();
            } else {
                const err = await response.text();
                alert('Failed to update station: ' + err);
            }
        } catch (err) {
            console.error('Error:', err);
            alert('Something went wrong.');
        }
    });

    document.getElementById('delete_station_button').addEventListener('click', async () => {
        const id = document.getElementById('edit_station_id').value;
        if (!confirm('Are you sure you want to delete this station?')) return;
        try {
            const response = await fetch(`/api/station/${id}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                alert('Station deleted.');
                edit_station_modal.close();
                window.location.reload();
            } else {
                const err = await response.text();
                alert('Failed to delete station: ' + err);
            }
        } catch (err) {
            console.error('Error:', err);
            alert('Something went wrong.');
        }
    });
</script>
