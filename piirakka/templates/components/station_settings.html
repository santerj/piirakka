<div class="overflow-y relative">
    <h1 class="sticky top-0 text-3xl pt-3 pb-6 pl-3 font-nunito font-semibold bg-inherit">Stations</h1>
    <div class="sticky -mt-2 top-12 divider bg-inherit"></div>
    
    <ul class="menu w-10/12">
        
        {% for station in stations %}
            <li class="group"
                data-station-id="{{ station.station_id }}"
                data-station-name="{{ station.name }}"
                data-station-url="{{ station.url }}">
                <div class="flex items-center gap-3 p-2">
                    <img class="size-6 dark:invert opacity-0 group-hover:opacity-100 transition-opacity"
                        src="static/icons/edit-line.svg"/>
                    <div>
                        <div class="text-lg font-semibold truncate">{{ station.name }}</div>
                        <div class="text-sm opacity-70 text-ellipsis">{{ station.url }}</div>
                    </div>
                </div>
            </li>
        {% endfor %}

    </ul>

</div>

{% include 'components/edit_station_modal.html' %}

<script>
    // open edit dialog with station data
    document.querySelectorAll('.menu li[data-station-id]').forEach(li => {
        li.addEventListener('click', function() {
            const id = this.dataset.stationId;
            const name = this.dataset.stationName;
            const url = this.dataset.stationUrl;
            document.getElementById('edit_station_id').value = id;
            document.getElementById('edit_station_name').value = name;
            document.getElementById('edit_station_url').value = url;
            edit_station_modal.showModal();
        });
    });
</script>
